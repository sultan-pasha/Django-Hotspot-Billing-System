<VirtualHost *:80>
	ServerAdmin saskecompany1@gmail.com
	ServerName sinkrow-hotspot.net
	

	DocumentRoot /home/saske/sinkrow-hotspot

	Alias /static /var/www/hotspot/static
	<Directory /var/www/hotspot/static>
		Require all granted
	</Directory>

	<Directory /home/saske/sinkrow-hotspot/sinkrow_hotspot>
		<Files wsgi.py>
			Require all granted
		</Files>
	</Directory>


	WSGIDaemonProcess sinkrow_hotspot python-home=/home/saske/sinkrow-hotspot/saskenv python-path=/home/saske/sinkrow-hotspot/
	WSGIProcessGroup sinkrow_hotspot
	WSGIScriptAlias / /home/saske/sinkrow-hotspot/sinkrow_hotspot/wsgi.py process-group=sinkrow_hotspot
        ErrorLog /var/www/sinkrowhotspot/logs/error.log
	CustomLog /var/www/sinkrowhotspot/logs/access.log combined
</VirtualHost>
